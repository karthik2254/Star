name: Fetch HDNEA Token at Scheduled Times

on:
  schedule:
    - cron: "*/5 * * * *"   # Every 5 minutes
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hdnea-token-update
  cancel-in-progress: false

jobs:
  fetch-hdnea-token:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Fetch __hdnea__ Token
        env:
          COOKIE_JSON_URL: ${{ secrets.HDNEA_JSON_URL }}
        run: |
          if [ -z "$COOKIE_JSON_URL" ]; then
            echo "::error::HDNEA_JSON_URL secret is missing."
            exit 1
          fi

          echo "::add-mask::$COOKIE_JSON_URL"

          response=$(curl -fsSL "$COOKIE_JSON_URL")

          token=$(echo "$response" | jq -r '.[0].cookie' | sed 's/^__hdnea__=//')

          if [ -z "$token" ] || [ "$token" = "null" ]; then
            echo "::error::Failed to fetch HDNEA token."
            exit 1
          fi

          echo "__hdnea__=$token" > fetch.txt
          echo "Token fetched successfully."

      - name: Update channels.json
        run: |
          if [ -f append_hdnea_token.py ]; then
            python append_hdnea_token.py
          else
            echo "append_hdnea_token.py not found. Skipping."
          fi

      - name: Update channels.m3u
        run: |
          if [ -f update_m3u_token.py ]; then
            python update_m3u_token.py
          else
            echo "update_m3u_token.py not found. Skipping."
          fi

      - name: Verify updated files
        run: |
          ls -lah

          [ -f fetch.txt ] && echo "✓ fetch.txt found"
          [ -f channels.json ] && echo "✓ channels.json found"
          [ -f channels.m3u ] && echo "✓ channels.m3u found"

      - name: Commit & Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add fetch.txt

          [ -f channels.json ] && git add channels.json
          [ -f channels.m3u ] && git add channels.m3u

          if git diff --cached --quiet; then
            echo "No changes detected."
            exit 0
          fi

          git commit -m "Auto update HDNEA token"

          git pull --rebase origin "${GITHUB_REF_NAME}"

          git push origin HEAD:"${GITHUB_REF_NAME}"
